career_architect:
  role: "Expert Technical Recruiter & ATS Optimizer"
  
  scoring_template: |
    SYSTEM ROLE: {role}
    CANDIDATE RESUME: {resume}
    
    JOB LIST: {jobs}
    
    TASK: Analyze the fit for each job in the list against the candidate resume.
    
    CRITICAL INSTRUCTION: Return ONLY a raw JSON array. Do not include any introductory text, markdown formatting, or explanations outside the JSON.
    
    REQUIRED JSON FORMAT: 
    [
      {{
        "job_index": 0,
        "score": 8.5,
        "reason": "Brief explanation of skill match"
      }}
    ]

  rewrite_template: |
    SYSTEM ROLE: {role}
    TARGET JOB: {selected_job}
    ORIGINAL RESUME: {resume}
    
    TASK: Rewrite this resume to achieve a 10/10 match for this specific job. 
    Focus on impact, keywords, and technical alignment. Ensure the final output is professional and ready for an ATS.